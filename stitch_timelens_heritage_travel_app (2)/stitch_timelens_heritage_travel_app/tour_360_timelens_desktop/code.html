<script>
        // Simple script to handle dragging the panorama background for interaction simulation
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('panorama-container');
            const bgElement = container.querySelector('.panorama-bg');
            let isDragging = false;
            let startX;
            let bgPositionX = 0; // percentage

            // Pause animation on drag
            container.addEventListener('mousedown', (e) => {
                if(e.target.tagName === 'BUTTON' || e.target.closest('button')) return; // Ignore hotspots
                isDragging = true;
                startX = e.pageX;
                bgElement.style.animation = 'none'; // Stop auto-pan
                // Rough extraction of current position to prevent jumping
                const currentStyle = window.getComputedStyle(bgElement);
                const pos = currentStyle.getPropertyValue('background-position-x');
                if(pos.includes('%')) {
                     bgPositionX = parseFloat(pos);
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const walk = (e.pageX - startX) * 0.1; // Drag sensitivity
                bgPositionX = bgPositionX - walk;
                // Keep within 0-100 bounds roughly for visual effect, or let it wrap
                bgElement.style.backgroundPosition = `${bgPositionX}% center`;
                startX = e.pageX; // Reset for smooth continuous drag
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });
        });
    </script>
