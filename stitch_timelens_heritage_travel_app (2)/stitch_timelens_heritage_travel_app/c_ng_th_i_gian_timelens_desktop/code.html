        /* Custom styles for the slider and particles to keep HTML somewhat clean */
        .split-view-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 64px); /* Adjust for TopNavBar */
            overflow: hidden;
        }

        .view-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .view-past {
            z-index: 10;
            /* The past view will be clipped by JavaScript based on slider position */
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
            /* Example sepia filter for the past, though the image itself should ideally be styled */
            filter: sepia(0.6) contrast(1.1) brightness(0.9);
        }

        .view-present {
            z-index: 5;
        }

        .slider-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: linear-gradient(to bottom, transparent, #f2bf50, transparent);
            z-index: 20;
            transform: translateX(-50%);
            cursor: ew-resize;
            box-shadow: 0 0 15px #f2bf50, 0 0 30px #f2bf5080;
        }

        .slider-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background-color: #1b1c24;
            border: 2px solid #f2bf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #f2bf5080;
            cursor: pointer;
            z-index: 21;
        }

        /* Ambient Particles - Basic CSS implementation */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: float-up 5s linear infinite;
        }

        .particle-gold { background-color: #f2bf50; box-shadow: 0 0 5px #f2bf50; z-index: 15; }
        .particle-cyan { background-color: #44dbd5; box-shadow: 0 0 5px #44dbd5; z-index: 6; }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .era-tab-active {
            position: relative;
        }
        .era-tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #44dbd5;
            box-shadow: 0 0 10px #44dbd5, 0 0 20px #44dbd5;
        }

        /* Dong Son drum pattern overlay (simulated with CSS gradients for simplicity, ideally an SVG pattern) */
        .pattern-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: repeating-radial-gradient( circle at 0 0, transparent 0, #12131b 10px ), repeating-linear-gradient( #2E2F3855, #2E2F3855 );
            opacity: 0.05;
            z-index: 1;
        }
    </style>

<script>
        // Interactive Slider Logic
        const container = document.getElementById('split-view-container');
        const slider = document.getElementById('slider');
        const pastView = document.getElementById('view-past');
        const particlesLeft = document.getElementById('particles-left');

        let isDragging = false;

        slider.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.style.cursor = 'ew-resize';
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.style.cursor = 'default';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const rect = container.getBoundingClientRect();
            let x = e.clientX - rect.left;

            // Constrain
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;

            const percentage = (x / rect.width) * 100;

            // Update positions
            slider.style.left = `${percentage}%`;
            pastView.style.clipPath = `polygon(0 0, ${percentage}% 0, ${percentage}% 100%, 0 100%)`;
            
            // Adjust particle container width
            particlesLeft.style.width = `${percentage}%`;
        });

        // Basic Particle System Generator
        function createParticles(containerId, count, typeClass) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle', typeClass);
                
                // Random properties
                const size = Math.random() * 4 + 2; // 2px to 6px
                const left = Math.random() * 100; // 0% to 100%
                const duration = Math.random() * 5 + 3; // 3s to 8s
                const delay = Math.random() * 5; // 0s to 5s

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;

                container.appendChild(particle);
            }
        }

        // Initialize particles
        createParticles('particles-left', 30, 'particle-gold');
        createParticles('particles-right', 30, 'particle-cyan');
    </script>
