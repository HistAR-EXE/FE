        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }

        .pattern-overlay {
            background-image: radial-gradient(circle at center, rgba(242, 191, 80, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .glow-primary {
            box-shadow: 0 0 20px rgba(242, 191, 80, 0.3);
        }
        
        .glow-secondary {
            box-shadow: 0 0 20px rgba(68, 219, 213, 0.3);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md lg:p-xl relative overflow-hidden">
<!-- Background atmosphere -->
<div class="fixed inset-0 pattern-overlay z-0"></div>
<div class="fixed top-0 left-0 w-1/2 h-1/2 bg-primary/5 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2 z-0"></div>
<div class="fixed bottom-0 right-0 w-1/2 h-1/2 bg-secondary/5 rounded-full blur-[100px] translate-x-1/2 translate-y-1/2 z-0"></div>
<!-- Main Content Container -->
<div class="relative z-10 w-full max-w-[1200px] bg-surface-container/60 backdrop-blur-2xl border border-outline-variant/30 rounded-[24px] overflow-hidden shadow-2xl flex flex-col md:flex-row h-auto md:h-[700px]">
<!-- Left Side: Image Preview -->
<div class="w-full md:w-3/5 h-[400px] md:h-full relative overflow-hidden group">

<div class="absolute inset-0 bg-gradient-to-t from-background via-background/20 to-transparent"></div>
<!-- Watermark / Branding on Image -->
<div class="absolute bottom-lg left-lg flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center glow-primary">
<span class="material-symbols-outlined text-on-primary fill text-[20px]">timelapse</span>
</div>
<div>
<h2 class="font-headline-lg text-headline-lg text-primary tracking-widest uppercase">TimeLens</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Hành trình di sản</p>
</div>
</div>
</div>
<!-- Right Side: Share Actions -->
<div class="w-full md:w-2/5 flex flex-col p-lg md:p-xl h-full overflow-y-auto">
<div class="flex justify-between items-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Chia sẻ</h1>
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined group-hover:rotate-90 transition-transform duration-300">close</span>
</button>
</div>
<div class="flex-1 flex flex-col gap-xl justify-center">
<!-- Message Box -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Thông điệp</label>
<div class="relative">
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-md font-body-md text-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all resize-none" placeholder="Nhập thông điệp của bạn..." rows="3">Khám phá vẻ đẹp vượt thời gian của cố đô! #TimeLens #HanhTrinhDiSan</textarea>
<div class="absolute bottom-sm right-sm text-on-surface-variant/50 font-label-sm text-label-sm">
                            65/200
                        </div>
</div>
</div>

<div class="space-y-md">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Chia sẻ lên</label>

<!-- TikTok -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high border border-outline-variant/30 flex items-center justify-center group-hover:bg-surface-variant group-hover:border-secondary transition-all">

<span class="material-symbols-outlined text-[28px] text-on-surface group-hover:text-secondary transition-colors">music_note</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">TikTok</span>
</button>
<!-- Instagram -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high border border-outline-variant/30 flex items-center justify-center group-hover:bg-surface-variant group-hover:border-tertiary-container transition-all">
<span class="material-symbols-outlined text-[28px] text-on-surface group-hover:text-tertiary-container transition-colors">photo_camera</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Instagram</span>
</button>
<!-- Facebook -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high border border-outline-variant/30 flex items-center justify-center group-hover:bg-surface-variant group-hover:border-[#1877F2] transition-all">
<span class="material-symbols-outlined text-[28px] text-on-surface group-hover:text-[#1877F2] transition-colors">public</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Facebook</span>
</button>
<!-- Copy Link -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high border border-outline-variant/30 flex items-center justify-center group-hover:bg-surface-variant group-hover:border-primary transition-all">
<span class="material-symbols-outlined text-[28px] text-on-surface group-hover:text-primary transition-colors">link</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Sao chép</span>
</button>
</div>
</div>
</div>

<div class="mt-xl pt-lg border-t border-outline-variant/30">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-title-md text-title-md py-md px-lg rounded-xl flex justify-center items-center gap-sm transition-all glow-primary active:scale-[0.98]">
<span class="material-symbols-outlined fill">share</span>
                    Chia sẻ ngay
                </button>
</div>
