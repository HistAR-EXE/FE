<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent; }
    </style>
</head>
<body>
<a-scene
        mindar-image="imageTargetSrc: /assets/targets.mind; filterMinCF: 0.0001; filterBeta: 0.001;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

    <a-assets>
        <a-asset-item id="model-hat" src="/assets/hat.glb"></a-asset-item>
        <a-asset-item id="model-lamp" src="/assets/lamp.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="1 2 1"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" class="ar-target" data-key="artifact:den-dau">
        <a-gltf-model
                rotation="0 0 0"
                position="0 -0.1 0.1"
                scale="0.5 0.5 0.5"
                src="#model-lamp"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
                animation__bob="property: position; to: 0 0 0.2; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine">
        </a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1" class="ar-target" data-key="artifact:mu-tai-beo">
        <a-gltf-model
                rotation="0 0 0"
                position="0 0.05 0.1"
                scale="0.2 0.2 0.2"
                src="#model-hat"
                animation="property: rotation; to: 0 -360 0; loop: true; dur: 15000; easing: linear"
                animation__bob="property: position; to: 0 0.15 0.25; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine">
        </a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2" class="ar-target" data-key="artifact:tram-xa">
        <a-gltf-model
                rotation="0 0 0"
                position="0 -0.1 0.1"
                scale="0.6 0.6 0.6"
                src="#model-lamp"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
                animation__bob="property: position; to: 0 -0.1 0.2; dir: alternate; loop: true; dur: 1800; easing: easeInOutSine">
        </a-gltf-model>
    </a-entity>

</a-scene>

<script>
    const targets = document.querySelectorAll('.ar-target');

    targets.forEach(target => {
        target.addEventListener('targetFound', event => {
            const unlockKey = target.getAttribute('data-key');
            console.log("🟢 [WebAR] Target Found! Sending unlock key:", unlockKey);
            window.parent.postMessage({ type: 'AR_TARGET_FOUND', unlockKey: unlockKey }, '*');
        });

        target.addEventListener('targetLost', event => {
            const unlockKey = target.getAttribute('data-key');
            console.log("🔴 [WebAR] Target Lost:", unlockKey);
        });
    });
</script>
</body>
</html>
